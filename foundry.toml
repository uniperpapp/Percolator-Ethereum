[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
# via-IR avoids "stack too deep" in the math-heavy SolvencyProof / RiskEngine
# libraries (many locals on the §1.6 proof path) and yields better codegen.
via_ir = true
# 256-bit native math + checked arithmetic by default (Solidity >=0.8).
# Percolator's engine relies on exact integer rounding; never enable
# unchecked globally — only at proven-bounded call sites.
evm_version = "cancun"
verbosity = 2
gas_reports = ["PerpMarket", "RiskEngine"]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

# Remappings live in remappings.txt
